<!doctype html>
<html>
  <head>
    <title>Sistem Deteksi Berita Hoax</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 0;
      }

      .container {
        width: 80%;
        max-width: 900px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #333;
      }

      label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
      }

      select {
        padding: 10px;
        border-radius: 6px;
      }

      textarea {
        width: 100%;
        height: 220px;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
      }

      button {
        padding: 12px 25px;
        margin-top: 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #5563d6;
      }

      .result-box {
        margin-top: 25px;
        padding: 20px;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
        font-weight: bold;
      }

      .hoax {
        background-color: #ffe5e5;
        color: #cc0000;
      }

      .valid {
        background-color: #e5ffe5;
        color: #009900;
      }

      .footer {
        margin-top: 30px;
        text-align: center;
        font-size: 13px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Sistem Deteksi Berita Hoax</h1>

      <form method="POST">
        <label>Pilih Model:</label>

        <select name="model">
          <option value="bert">BERT</option>

          <option value="svm">SVM</option>
        </select>

        <!-- INI WAJIB ADA -->
        <script>
          document.querySelector("select[name='model']").value = "{{ model_choice }}";
        </script>

        <label>Masukkan Teks Berita:</label>

        <textarea name="news" placeholder="Masukkan teks berita yang ingin diklasifikasikan..."></textarea>

        <br />

        <button type="submit">🔍 Klasifikasi Berita</button>
      </form>

      {% if prediction %}

      <div class="result-box {% if prediction == 'Hoax' %} hoax {% else %} valid {% endif %}">
        <b>Model Digunakan:</b>
        {{ model_choice|upper }}

        <br /><br />

        <b>Hasil Prediksi:</b>
        {{ prediction }}
      </div>

      {% endif %}

      <div class="footer">Sistem Deteksi Berita Hoax — Skripsi Machine Learning & Deep Learning</div>
    </div>
  </body>
</html>
